<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form Validation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-container">
        <h2>Get in Touch</h2>
        <div id="successMessage" class="success-message hidden">🎉 Thank you! Your message has been sent successfully.</div>
        
        <form id="contactForm" novalidate>
            <!-- Name Field -->
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your full name">
                <span class="error-message" id="nameError"></span>
            </div>

            <!-- Email Field -->
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email address">
                <span class="error-message" id="emailError"></span>
            </div>

            <!-- Message Field -->
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" placeholder="Type your message here..."></textarea>
                <span class="error-message" id="messageError"></span>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="submitBtn">Send Message</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
